name: Bug report
description: Report a reproducible community-profile bug.
title: "[Bug]: "
labels: ["bug", "community"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve AI Model Builder."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Docker version, browser, and relevant logs.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This report does not include secrets, credentials, private data, or vulnerability details.
          required: true
        - label: This appears to affect the community profile.
          required: true
