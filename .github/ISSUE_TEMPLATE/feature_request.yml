name: Feature request
description: Suggest a public documentation, extension, source, or launcher improvement.
title: "[Feature]: "
labels: ["enhancement", "community"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What public user or contributor problem would this solve?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - documentation
        - installation
        - extension or theme proposal
        - training-source metadata
        - accessibility
        - other public feature
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: Describe the expected public behavior without private data or implementation details.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety
      options:
        - label: This request contains no credentials, customer data, private source, or vulnerability details.
          required: true
